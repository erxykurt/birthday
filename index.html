<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Meeseeks</title>

    <link rel="stylesheet" href="style.css">
</head>



<body>

<div id="summonScreen">
    <button id="summonBtn">SUMMON</button>
</div>

<div class="stars"></div>

<div class="container" style="display:none;">

    <div class="character">

        <img src="images/portal.png" class="portal">

        <img src="images/meeseeks.png" class="meeseeks">

    </div>

    <h1>MR. MEESEEKS</h1>

    <p>Existence is Pain.</p>

    <textarea
id="task"
maxlength="300"
placeholder="What is my task?"></textarea>

    <button id="completeButton">
        COMPLETE MY TASK
    </button>

    <div id="completed">
    ✔ SUBJECT COMPLETED
</div>
<div id="birthday">

    <div class="birthday-content">

        <h1>🎉 HAPPY BIRTHDAY ❤️</h1>

    </div>

</div>

</div>

<audio id="helloAudio">
    <source src="sounds/hello.mp3" type="audio/mpeg">
</audio>

<audio id="puffAudio">
    <source src="sounds/puff.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
